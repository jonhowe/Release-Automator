name: Test release automator

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run --locked ruff check .
      - run: uv run --locked pyright
      - run: uv run --locked pytest --cov=release_automator

