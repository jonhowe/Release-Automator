[git]
branch_prefix = "agent/"
merge_method = "squash"
delete_remote_branch = true
delete_local_branch = true

[checks]
required = ["test"]
accepted_conclusions = ["success"]
poll_seconds = 10
discovery_timeout_seconds = 300
completion_timeout_seconds = 3600
allow_no_checks = false

[release]
enabled_by_default = true
tag_prefix = "v"
side_effect_notice = "Publishing a release may trigger repository-specific deployment or package workflows."

[openai]
model = "gpt-5.4-mini-2026-03-17"
max_diff_bytes = 200000

[[validation]]
name = "lint"
argv = ["uv", "run", "--locked", "ruff", "check", "."]

[[validation]]
name = "type check"
argv = ["uv", "run", "--locked", "pyright"]

[[validation]]
name = "tests"
argv = ["uv", "run", "--locked", "pytest"]
