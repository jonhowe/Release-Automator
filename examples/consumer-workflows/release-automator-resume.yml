name: Resume a release plan

on:
  workflow_dispatch:
    inputs:
      plan_run_id:
        description: Run ID of the successful Plan a release workflow.
        required: true
        type: string
      state_run_id:
        description: Run ID of the failed execute or resume workflow.
        required: true
        type: string
      plan_id:
        description: Exact 64-character approved plan ID.
        required: true
        type: string

permissions:
  actions: read
  checks: read
  statuses: read
  contents: read

jobs:
  resume:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Check out the target with the release credential
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          path: target
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.RELEASE_AUTOMATOR_GITHUB_TOKEN }}

      - name: Download the frozen plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-automator-plan-${{ inputs.plan_id }}
          path: ${{ runner.temp }}/release-automator/plan
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}

      - name: Download the failed run state
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-automator-state-${{ inputs.plan_id }}
          path: ${{ runner.temp }}/release-automator/recovery
          run-id: ${{ inputs.state_run_id }}
          github-token: ${{ github.token }}

      - name: Configure the commit identity
        shell: bash
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resume the exact approved plan
        id: resume
        uses: jonhowe/Release-Automator@v0.3.0
        with:
          mode: resume
          repo-path: target
          bundle-path: ${{ runner.temp }}/release-automator/plan/plan.zip
          plan-id: ${{ inputs.plan_id }}
          approved-plan-id: ${{ inputs.plan_id }}
          run-state: ${{ runner.temp }}/release-automator/recovery/run.json
          repository-bundle: ${{ runner.temp }}/release-automator/recovery/repository.bundle
          state-path: ${{ runner.temp }}/release-automator/state
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_AUTOMATOR_GITHUB_TOKEN }}
          GITHUB_CHECKS_TOKEN: ${{ github.token }}

      - name: Upload updated resumable state after a failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-automator-state-${{ inputs.plan_id }}
          path: ${{ runner.temp }}/release-automator/state
          if-no-files-found: warn
          retention-days: 30
